[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "async-pulse"
version = "0.1.0"
description = "Async pulse project"
requires-python = ">=3.8"
dependencies = [
    "fastapi[standard]",
]

[project.optional-dependencies]
dev = [
    "black",
    "flake8",
    "autopep8",
    "isort",
    "mypy",
]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.isort]
profile = "black"

[tool.mypy]
strict = true
